name: ci

on:
  pull_request:
  push:
    branches:
      - code-experiments-agent-init
      - "feature/**"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest
